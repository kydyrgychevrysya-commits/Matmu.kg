<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KETPE</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#222,#000);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card {
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid #FFD700;
    padding:40px;
    width:320px;
    text-align:center;
    border-radius:25px;
    color:white;
    box-shadow:0 0 40px rgba(255,215,0,0.4);
}

h1 {
    color:#FFD700;
    font-size:40px;
    letter-spacing:6px;
}

p {
    font-size:18px;
    line-height:1.6;
}

.date {
    color:#FFD700;
    font-size:24px;
    font-weight:bold;
}

.heart {
    position:absolute;
    color:#ff4d6d;
    font-size:25px;
    animation:heart 6s infinite;
}

@keyframes heart {
    0% {
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    50% {
        opacity:1;
    }
    100% {
        transform:translateY(-10vh) scale(1.5);
        opacity:0;
    }
}

a {
    color:#FFD700;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="heart" style="left:10%;animation-delay:1s;">❤️</div>
<div class="heart" style="left:35%;animation-delay:3s;">❤️</div>
<div class="heart" style="left:70%;animation-delay:2s;">❤️</div>
<div class="heart" style="left:90%;animation-delay:4s;">❤️</div>


<div class="card">

<h1>KETPE</h1>

<p>
✨ VIP приглашение ✨
</p>

<p>
С радостью приглашаем вас<br>
на празднование<br>
<strong>Дня Рождения</strong>
</p>

<p>
Вас ждёт красивый вечер<br>
в приятной атмосфере ❤️
</p>

<p class="date">
28 июля<br>
18:00
</p>

<p>
📍 PASHTET (Паштет)
</p>

<a href="https://2gis.kg/bishkek/geo/70000001089356957">
Открыть карту 🗺️
</a>

</div>

</body>
</html>

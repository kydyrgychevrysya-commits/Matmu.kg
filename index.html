<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Malika Invitation</title>

<style>

body {
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

.card {
    width:330px;
    padding:35px;
    text-align:center;
    background:linear-gradient(145deg,#171717,#090909);
    border:1px solid #d4af37;
    border-radius:25px;
    box-shadow:0 0 40px rgba(212,175,55,0.4);
}

h1 {
    color:#d4af37;
    font-size:30px;
}

.gold {
    color:#d4af37;
    font-size:22px;
    font-weight:bold;
}

.info {
    line-height:1.7;
    font-size:17px;
}

button {
    margin-top:20px;
    padding:14px 35px;
    border:none;
    border-radius:30px;
    background:#d4af37;
    color:#000;
    font-size:16px;
    cursor:pointer;
}


.heart {
    position:absolute;
    font-size:25px;
    animation:heart 8s infinite;
}

@keyframes heart {

0% {
bottom:-50px;
opacity:0;
}

50% {
opacity:1;
}

100% {
bottom:100vh;
opacity:0;
}

}

</style>

</head>


<body>


<div class="heart" style="left:10%;">❤️</div>
<div class="heart" style="left:30%;animation-delay:2s;">❤️</div>
<div class="heart" style="left:70%;animation-delay:4s;">❤️</div>
<div class="heart" style="left:90%;animation-delay:1s;">❤️</div>



<div class="card">

<h1>
✨ Малика приглашает вас ✨
</h1>


<p>
На празднование
</p>


<p class="gold">
18-летия ❤️
</p>


<div class="info">

📅 <b>28 июля</b><br>

⏰ <b>18:00</b><br>

📍 <b>PASHTET (Паштет)</b><br>

👗 <b>Дресс-код:</b><br>
Вечерний стиль

<br><br>

Гости, состоящие в отношениях,
приглашаются парами.

<br><br>

Подарки — денежные средства
от 1500 сомов или подарок
на ваше усмотрение.

</div>


<button onclick="showForm()">
❤️ Я приду
</button>


<div id="form" style="display:none;">

<h3>Подтвердите присутствие</h3>

<input id="name" placeholder="Ваше имя"
style="padding:10px;border-radius:10px;border:0;">

<br>

<button onclick="send()">
Отправить
</button>

</div>


</div>



<script>

function showForm(){
document.getElementById("form").style.display="block";
}


function send(){
let name=document.getElementById("name").value;

alert("Спасибо, "+name+" ❤️");
}

</script>


</body>
</html>

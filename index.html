<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Malika Invitation</title>

<style>
body {
    margin:0;
    height:100vh;
    background: radial-gradient(circle,#222,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

.card {
    width:330px;
    padding:35px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    border:1px solid #d4af37;
    border-radius:25px;
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(212,175,55,0.5);
    animation:show 2s;
}

@keyframes show {
    from {
        opacity:0;
        transform:scale(0.7);
    }
    to {
        opacity:1;
        transform:scale(1);
    }
}

h1 {
    color:#d4af37;
    font-size:30px;
}

h2 {
    color:#fff;
}

.gold {
    color:#d4af37;
    font-size:22px;
    font-weight:bold;
}

button {
    margin-top:15px;
    padding:13px 30px;
    border:none;
    border-radius:30px;
    background:#d4af37;
    color:black;
    font-size:16px;
}

.heart {
    position:absolute;
    font-size:25px;
    animation:fly 7s infinite;
}

@keyframes fly {
    0% {
        bottom:-50px;
        opacity:0;
    }
    50% {
        opacity:1;
    }
    100% {
        bottom:100vh;
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="heart" style="left:10%;">❤️</div>
<div class="heart" style="left:30%;animation-delay:2s;">❤️</div>
<div class="heart" style="left:70%;animation-delay:4s;">❤️</div>
<div class="heart" style="left:90%;animation-delay:1s;">❤️</div>


<div class="card">

<h1>✨ Малика приглашает вас ✨</h1>

<h2>на празднование</h2>

<p class="gold">
18-летия ❤️
</p>

<p>
📅 <b>28 июля</b><br>
⏰ <b>18:00</b>
</p>

<p>
📍 PASHTET (Паштет)
</p>

<p>
👗 Дресс-код:<br>
Вечерний стиль
</p>

<p>
Гости, состоящие в отношениях,
приглашаются парами.
<br><br>
Подарки — денежные средства
от 1500 сомов или подарок
по вашему выбору.
</p>


<a href="https://2gis.kg/bishkek/geo/70000001089356957">
<button>
🗺 Открыть место
</button>
</a>


<br>

<button onclick="document.getElementById('music').play()">
🎵 Включить музыку
</button>


</div>


<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>


</body>
</html>
